<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying... | Uberpng</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9fafb;
            color: #111827;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
        .btn {
            display: inline-block;
            background-color: #673ab7; /* Deep Purple to match your app theme */
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #5e35b1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Email Verified! ✅</h1>
        <p>Your email address has been successfully verified.</p>
        <p>You can now close this browser window, return to the Uberpng app, and sign in with your credentials.</p>
    </div>
</body>
</html>
